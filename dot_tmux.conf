# =====================
# 基础
# =====================
set -g default-terminal "screen-256color"
set -g history-limit 10000

# 快捷键前缀改 Ctrl+a
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# 用 Ctrl+a r 重载配置
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# =====================
# 分割窗口
# =====================
bind | split-window -h
bind - split-window -v

# =====================
# 窗口切换（Vim 风格）
# =====================
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# =====================
# 鼠标支持
# =====================
set -g mouse on

# 选中即复制到系统剪贴板
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe "xclip -selection clipboard"
bind -T copy-mode MouseDragEnd1Pane send -X copy-pipe "xclip -selection clipboard"

# Ctrl+a p 粘贴系统剪贴板内容
bind p run "xclip -selection clipboard -o | tmux load-buffer - && tmux paste-buffer"
